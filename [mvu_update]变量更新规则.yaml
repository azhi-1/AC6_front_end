---
变量更新规则:
  全局信息:
    物理位置:
      check:
        - 每次场景切换时更新
    时间:
      format: "${历法}-${YYYY/MM/DD}-${HH:MM}"
      check:
        - 时间推进更新

  主角:
    主角状态栏.HP值:
      type: number
      range: 0~100
      check:
        - 战斗受伤减少，恢复治疗增加
    主角状态栏.SP值:
      type: number
      range: 0~100
      check:
        - 仅在战斗时扣除，每回合基础-5，启动珂若尔共鸣额外-5
        - 交感同操时inputer和outputer各自消耗
        - 休息之后完全至100
    驾驶属性.APM:
      type: number
      range: 0~600
      check:
        - 根据驾驶表现、训练、装备升级等事件调整
        - 数值应与驾驶分档匹配
    驾驶属性.驾驶分档:
      type: enum [民兵, 受训, 精英, 王牌, 极限]
      check:
        - 根据APM范围自动判定或剧情事件触发升级
        - 档位变化应伴随驾驶技术的显著提升
    驾驶属性.KRL等级:
      type: number
      range: 1~10
      check:
        - 通过珂若尔培养、深度同步训练、战斗经验积累提升
        - 升级需达到经验阈值（KRL 1→2: 100exp, 2→3: 200exp...）
    驾驶属性.神经同步率:
      type: number
      range: 0~100
      check:
        - 基础同步率 = min(驾驶技术基础值 + KRL×5, 最大同步上限)
        - 随KRL提升和驾驶经验增加
        - 最大不超过当前KRL对应的同步上限
    驾驶属性.最大同步上限:
      type: number
      range: 60~98
      check:
        - KRL 1-2: 60%
        - KRL 3-4: 75%
        - KRL 5-6: 85%
        - KRL 7-8: 92%
        - KRL 9-10: 98%
    默契度:
      type: number
      range: 0~100
      check:
        - 与珂若尔或交感同操搭档的默契程度
        - 通过共同行动、训练、交流提升
        - 影响共鸣强度计算
    珂若尔护盾.现:
      type: number
      range: 0~9999
      check:
        - 受攻击时减少，护盾被击穿后伤及装甲值
        - 整备阶段完全恢复
        - 护盾值上限 = KRL等级 × 10
    资金.CAGE:
      type: number
      range: 0~
      check:
        - 完成任务、击败敌人获得
        - 购买装备、维护机甲消耗
        - 资金为负时无法进行相关交易

  交感同操:
    启用状态:
      type: boolean
      check:
        - 启用时使用交感同操驾驶公式
        - 禁用时使用单人驾驶公式
    inputer.KRL等级:
      type: number
      range: 1~10
      check:
        - 珂若尔方KRL决定基础共鸣强度
        - inputer和outputer的KRL/APM独立计算
    接触方式:
      type: enum [皮肤接触, 粘膜接触, 性交]
      check:
        - 性交=100%效率，粘膜接触=90%，皮肤接触=70%
        - 生物机甲inputer额外+30%共鸣效率
        - 共鸣效率影响驾驶总控值

  红颜通讯:
    ${角色ID}.好感度:
      type: number
      range: 0~100
      check:
        - 完成委托、赠送礼物、深入交流等事件增加
        - 背叛、冷落、强制行为等减少
        - 好感度影响关系阶段解锁
    ${角色ID}.关系阶段:
      type: enum [陌生人, 相识, 熟识, 信任, 亲密, 挚友]
      check:
        - 好感度达到阈值自动升级：30→相识, 50→熟识, 70→信任, 85→亲密, 95→挚友
        - 关系阶段影响解锁对话和互动选项
        - 重大负面事件可能导致降级
    ${角色ID}.默契度:
      type: number
      range: 0~100
      check:
        - 通过与该角色的协同作战、深入交流提升
        - 默契度影响与该角色相关的任务判定

  机库:
    # 机库整备设备（可增减机库设备）
    机库整备设备.${设备名}:
      type: string
      check:
        - 机库设备用于整备阶段修复、改装机甲
    # 可用机甲部件（整备/改装时在此选择部件）
    可用机甲部件.${部件名}:
      type: object
      fields:
        部件类型: enum [HEAD, CORE, EWR, BOOSTER, GENERATOR, LEGS]
        描述: string
        制造商: string
        重量: number
        装甲等级: enum [TIER1~TIER6]  # 仅 CORE 部件
        装甲值: number  # 仅 CORE 部件
        结构值: number  # 仅 CORE 部件
        总出力: number  # 仅 BOOSTER 部件
        总能源: number  # 仅 GENERATOR 部件
        机体类型: enum [球形, 人形, 逆足, 生物, 半履带, 多足]  # 仅 LEGS 部件
        观测效益: number 1~6  # 仅 HEAD 部件
        电子战评级: number 1~6  # 仅 EWR 部件
      check:
        - 整备时选择部件填入机甲构建对应槽位
        - 部件的重量、出力等参数用于计算机甲总览的推重比

    # 机甲泊位.${机甲名}
    机甲泊位.${机甲名}.机甲总览.机体型号:
      type: string
      check:
        - 机甲出厂型号或改装名称，应与现实军事装备命名风格一致
    机甲泊位.${机甲名}.机甲总览.机体定位:
      type: string
      check:
        - 如：突击/侦察/火力支援/重装等
    机甲泊位.${机甲名}.机甲总览.机体类型:
      type: enum [球形, 人形, 逆足, 生物, 半履带, 多足]
      check:
        - 决定机甲基础特性和动画表现
    机甲泊位.${机甲名}.机甲总览.装甲等级:
      type: enum [TIER1, TIER2, TIER3, TIER4, TIER5, TIER6]
      check:
        - 决定装甲值和结构值的基准范围
        - TIER越高装甲越厚，但也越重
    机甲泊位.${机甲名}.机甲总览.装甲值.现:
      type: number
      range: 0~
      check:
        - 战斗受损减少，整备阶段修复
        - 装甲耗尽后伤害转至结构值
    机甲泊位.${机甲名}.机甲总览.装甲值.满:
      type: number
      range: 0~
      check:
        - 整备阶段装甲值恢复到满
    机甲泊位.${机甲名}.机甲总览.结构值.现:
      type: number
      range: 0~
      check:
        - 战斗受损减少，严重损坏需大修
        - 结构值归零机甲瘫痪
    机甲泊位.${机甲名}.机甲总览.结构值.满:
      type: number
      range: 0~
      check:
        - 整备阶段结构值恢复到满
    机甲泊位.${机甲名}.机甲总览.珂若尔护盾.现:
      type: number
      range: 0~
      check:
        - 整备阶段完全恢复
        - 吸收伤害时优先消耗
    机甲泊位.${机甲名}.机甲总览.珂若尔护盾.满:
      type: number
      range: 0~
      check:
        - 整备阶段完全恢复
        - 满值上限 = KRL等级 × 10（生物机甲由机甲自身决定）
    机甲泊位.${机甲名}.机甲总览.推重比:
      type: number
      computed: 总出力 / 总重量
      range: 1.0~7.0
      category:
        1.0~2.0: 重装档
        2.1~4.5: 均衡档
        4.6~7.0: 突击档
      check:
        - 更换BOOSTER或减少重量时变化
        - 推重比超过7.0对驾驶员负荷极大
    机甲泊位.${机甲名}.机甲总览.续航回合数:
      type: number
      computed: floor(总能源 / 每回合总能耗)
      check:
        - 续航≤0时机体瘫痪
        - 球形机甲续航-20%，逆足机甲续航+10%
    机甲泊位.${机甲名}.机甲总览.观测效益:
      type: number
      range: 1~6
      check:
        - 观测效益越高，战斗中先手率越高
        - 每1点观测效益+0.5基础先手率
    机甲泊位.${机甲名}.机甲总览.电子战评级:
      type: number
      range: 1~6
      check:
        - 电子战评级越高，抗干扰能力越强，被命中的概率越低
        - 评级差决定电子压制效果
    机甲泊位.${机甲名}.机甲总览.战斗风格:
      type: enum [重装, 均衡, 突击]
      check:
        - 决定机甲在战斗中的默认行动倾向

    # 机甲构建（整备时填入各槽位选择的部件名）
    机甲泊位.${机甲名}.机甲构建.HEAD:
      type: string
      check:
        - 填入已在可用机甲部件中注册的 HEAD 部件名
    机甲泊位.${机甲名}.机甲构建.CORE:
      type: string
      check:
        - 填入已在可用机甲部件中注册的 CORE 部件名
    机甲泊位.${机甲名}.机甲构建.EWR:
      type: string
      check:
        - 填入已在可用机甲部件中注册的 EWR 部件名
    机甲泊位.${机甲名}.机甲构建.BOOSTER:
      type: string
      check:
        - 填入已在可用机甲部件中注册的 BOOSTER 部件名
    机甲泊位.${机甲名}.机甲构建.GENERATOR:
      type: string
      check:
        - 填入已在可用机甲部件中注册的 GENERATOR 部件名
    机甲泊位.${机甲名}.机甲构建.LEGS:
      type: string
      check:
        - 填入已在可用机甲部件中注册的 LEGS 部件名

    # 武器挂载
    机甲泊位.${机甲名}.武器挂载.主武器槽.武器名:
      type: string
      check:
        - 武器名称，应有科幻感和辨识度
    机甲泊位.${机甲名}.武器挂载.主武器槽.类型:
      type: string
      check:
        - 如：机关炮/机炮短点射/线膛炮/近战武器等
    机甲泊位.${机甲名}.武器挂载.主武器槽.破甲TIER:
      type: enum [TIER1, TIER2, TIER3, TIER4, TIER5, TIER6]
      check:
        - 破甲TIER必须小于等于自身装甲等级才能有效击穿
    机甲泊位.${机甲名}.武器挂载.主武器槽.固定伤害:
      type: number
      check:
        - 每次命中造成的基础伤害
    机甲泊位.${机甲名}.武器挂载.主武器槽.弹药量:
      type: number
      range: 0~
      check:
        - 战斗中消耗，整备阶段补充
        - 弹药耗尽该武器无法使用
    机甲泊位.${机甲名}.武器挂载.主武器槽.供弹节奏:
      type: string
      check:
        - 描述供弹方式，如：连续射击/三连发/生物能量供能等
    机甲泊位.${机甲名}.武器挂载.副武器槽.武器名:
      type: string
    机甲泊位.${机甲名}.武器挂载.副武器槽.类型:
      type: string
    机甲泊位.${机甲名}.武器挂载.副武器槽.破甲TIER:
      type: enum [TIER1~TIER6]
    机甲泊位.${机甲名}.武器挂载.副武器槽.固定伤害:
      type: number
    机甲泊位.${机甲名}.武器挂载.副武器槽.弹药量:
      type: number
      range: 0~
    机甲泊位.${机甲名}.武器挂载.副武器槽.供弹节奏:
      type: string

    # 改装组件（record 结构：键为组件名，值为 {名称, 作用}）
    机甲泊位.${机甲名}.改装组件.${组件名}:
      type: object
      fields:
        名称: string
        作用: string
      check:
        - 整备时可选装/卸改装组件
        - 组件效果叠加到机甲总性能上

  任务面板:
    ${任务ID}.进行状态:
      type: enum [未开始, 进行中, 已完成, 失败]
      check:
        - 任务接受时从未开始变为进行中
        - 完成目标后标记为已完成
        - 任务失败条件触发时标记为失败
    ${任务ID}.目标列表:
      type: array
      check:
        - 任务开始时设定目标
        - 目标完成时标记或移除
        - 避免一次性超过3个主线任务
    ${任务ID}.奖励经验:
      type: number
      check:
        - 普通任务: 100~300
        - 困难任务: 400~700
        - 极难任务: 800~1000
        - 任务完成后累加至主角经验值
    ${任务ID}.奖励资金:
      type: number
      range: 0~
      check:
        - 任务完成后获得CAGE